name: CI

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

  workflow_call:



jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      AWS_REGION: eu-west-3
      ORANGE_API_URL: ${{
              (github.event_name == 'pull_request' && github.base_ref == 'prod') && secrets.PROD_ORANGE_API_URL ||
              (github.event_name == 'pull_request' && github.base_ref == 'preprod') && secrets.PREPROD_ORANGE_API_URL ||
              (github.ref == 'refs/heads/prod') && secrets.PROD_ORANGE_API_URL ||
              (github.ref == 'refs/heads/preprod') && secrets.PREPROD_ORANGE_API_URL
              }}


    steps:
      - uses: actions/checkout@v4.1.6

      - uses: actions/setup-java@v4.2.1
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Debug env vars
        run: |
          echo "ORANGE_API_URL is: $ORANGE_API_URL"
          echo "Length: ${#ORANGE_API_URL}"
          if [ -z "$ORANGE_API_URL" ]; then
            echo "ORANGE_API_URL is empty!"
          else
            echo "ORANGE_API_URL is set"
          fi    

      - run: chmod +x gradlew
      - run: chmod +x .shell/publish_gen_to_maven_local.sh
      - run: ./gradlew test

      

  format:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4.1.6
      - uses: actions/setup-java@v4.2.1
        with:
          java-version: '21'
          distribution: 'corretto'

      - run: chmod +x format.sh
      - run: ./format.sh && git diff --exit-code