<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vola — Export des paiements</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8F9FA] font-['Poppins']">
  <nav class="bg-[#16163f] text-white px-4 sm:px-8 lg:px-12 xl:px-16">
    <div class="max-w-7xl mx-auto flex items-center justify-between h-14 sm:h-16">
      <span class="text-lg sm:text-xl font-bold">Vola</span>
      <div class="flex items-center gap-4" sec:authorize="isAuthenticated()">
        <span class="text-xs sm:text-sm text-gray-300"
              th:text="${#authentication.getPrincipal().getAttribute('email')}"></span>
        <form th:action="@{/perform-logout}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button class="material-icons text-gray-300 hover:text-white transition-colors">logout</button>
        </form>
      </div>
    </div>
  </nav>

  <main class="max-w-xl mx-auto px-4 sm:px-8 pt-10 pb-14">
    <h1 class="text-2xl sm:text-3xl font-bold text-[#16163f] mb-2">Export des paiements</h1>
    <p class="text-gray-500 text-sm sm:text-base mb-8">
      Téléchargez les paiements d'une application sur une période donnée
    </p>

    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 sm:p-6">
      <form th:action="@{/payments/export/csv}" method="get" class="space-y-5">
        <div>
          <label for="applicationName" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
            Application
          </label>
          <select id="applicationName" name="applicationName" required
                  class="shadow-sm appearance-none border rounded-lg w-full py-3 px-4 leading-tight
                         focus:outline-none focus:ring-2 transition text-sm
                         border-gray-200 focus:ring-[#9933cc]/20 focus:border-[#9933cc]
                         bg-white text-gray-700">
            <option value="">— Sélectionnez une application —</option>
            <option th:each="app : ${applications}"
                    th:value="${app.name}" th:text="${app.name}"></option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="startDate" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
              Du
            </label>
            <input id="startDate" type="date" name="startDate"
                   class="shadow-sm appearance-none border rounded-lg w-full py-3 px-4
                          focus:outline-none focus:ring-2 transition text-sm
                          border-gray-200 focus:ring-[#9933cc]/20 focus:border-[#9933cc] text-gray-700">
          </div>
          <div>
            <label for="endDate" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
              Au
            </label>
            <input id="endDate" type="date" name="endDate"
                   class="shadow-sm appearance-none border rounded-lg w-full py-3 px-4
                          focus:outline-none focus:ring-2 transition text-sm
                          border-gray-200 focus:ring-[#9933cc]/20 focus:border-[#9933cc] text-gray-700">
          </div>
        </div>

        <button type="submit"
                class="bg-[#9933cc] hover:bg-[#7a28a3] text-white font-semibold
                       py-3 px-8 rounded-full transition-all transform hover:scale-105
                       focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#9933cc]
                       w-full sm:w-auto inline-flex items-center justify-center gap-2 text-sm sm:text-base">
          <span class="material-icons text-base">download</span>
          Exporter en CSV
        </button>
      </form>
    </div>
  </main>
</body>
</html>
